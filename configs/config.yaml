# Default configuration for video inpainting
defaults:
  - _self_

# Model configuration
model:
  type: unet  # unet, edvr
  in_channels: 3
  out_channels: 3
  base_channels: 64
  max_frames: 8

# Training configuration
training:
  num_epochs: 100
  batch_size: 4
  learning_rate: 1e-4
  optimizer: adam  # adam, adamw
  scheduler: cosine  # cosine, step, null
  weight_decay: 1e-5
  grad_clip: 1.0
  loss_type: charbonnier  # charbonnier, mse, l1, perceptual

# Data configuration
data:
  max_frames: 8
  target_size: [256, 256]
  mask_ratio: 0.1
  mask_type: random  # random, center, block
  num_workers: 4
  num_train_samples: 1000
  num_val_samples: 200

# Logging configuration
logging:
  log_dir: logs
  log_interval: 10
  use_wandb: false
  project_name: video-inpainting

# Paths
paths:
  checkpoint_dir: checkpoints
  data_dir: data
  output_dir: outputs

# System configuration
system:
  seed: 42
  device: auto  # auto, cuda, mps, cpu
  mixed_precision: false
